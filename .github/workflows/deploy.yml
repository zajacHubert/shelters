name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, master]

  # Always allow a manual trigger for hotfix deploys.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      # Pinned by SHA to prevent tag-swapping supply chain attacks.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          # npm ci uses the Windows-generated lockfile which only has
          # @ast-grep/napi-win32-x64-msvc. Install the Linux binding explicitly.
          npm install --no-save --ignore-scripts \
            @ast-grep/napi-linux-x64-gnu@0.40.5
        env:
          # Override minimum-release-age from .npmrc — wrangler and
          # @opennextjs/cloudflare are published frequently and would
          # otherwise be blocked when < 7 days old.
          NPM_CONFIG_MINIMUM_RELEASE_AGE: "0"

      # Inject any NEXT_PUBLIC_* build-time variables here as `env:` entries.
      # Runtime secrets are set in the Cloudflare Dashboard and preserved by
      # the --keep-vars flag already baked into the `deploy` script.
      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Example build-time variable — uncomment and add more as needed:
          # NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
