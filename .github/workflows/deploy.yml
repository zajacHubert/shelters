name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, master]

  # Always allow a manual trigger for hotfix deploys.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      # Pinned by SHA to prevent tag-swapping supply chain attacks.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: |
          # minimum-release-age blocks recently published wrangler/opennextjs
          sed -i '/minimum-release-age/d' .npmrc
          # package-lock.json was generated on Windows. The lockfile pins
          # win32 optional binaries; deleting it forces npm to re-resolve
          # platform bindings for linux-x64 on this runner (per the error
          # message from @ast-grep/napi itself).
          rm -f package-lock.json
          npm install --no-audit

      # Inject any NEXT_PUBLIC_* build-time variables here as `env:` entries.
      # Runtime secrets are set in the Cloudflare Dashboard and preserved by
      # the --keep-vars flag already baked into the `deploy` script.
      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Supabase build-time vars (NEXT_PUBLIC_ — inlined by next build, not secret)
          # Add as repository vars in GitHub: Settings → Secrets and variables → Variables
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          # Auth secret — add as repository secret: Settings → Secrets → Actions → New repository secret
          # Name: JWT_SECRET, Value: <same hex string as in .env.local>
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
