name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Pinned by SHA to prevent tag-swapping supply chain attacks.
      # To update: verify the new SHA on the action's releases page,
      # then update both the SHA and the version comment.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun pm ls --all 2>&1 | head -200

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test (unit + integration, excludes smoke)
        run: bun test tests/*.test.ts

      - name: Build (node target)
        run: bun run build

      - name: Build (binary)
        run: bun run build:binary

      - name: Smoke tests (binary + package)
        run: bun test tests/smoke/

  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test (unit + integration, excludes smoke)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path tests -Filter *.test.ts | ForEach-Object { $_.FullName }
          bun test @files

      - name: Build (node target)
        run: bun run build

      - name: Build (binary)
        run: bun run build:binary

      - name: Smoke tests (binary + package)
        run: bun test tests/smoke/

  e2e:
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (binary)
        run: bun run build:binary

      - name: Run e2e tests
        run: bun test tests/e2e/
        env:
          E2E_RESEND_API_KEY: ${{ secrets.E2E_RESEND_API_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_INBOX_EMAIL: ${{ secrets.E2E_INBOX_EMAIL }}

  e2e-windows:
    needs: [check-windows]
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (binary)
        run: bun run build:binary

      - name: Run e2e tests
        shell: pwsh
        run: bun test tests/e2e/
        env:
          E2E_RESEND_API_KEY: ${{ secrets.E2E_RESEND_API_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_INBOX_EMAIL: ${{ secrets.E2E_INBOX_EMAIL }}

  # ── Release jobs (master push only) ──────────────────────────────

  version:
    needs: [check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Bump version
        id: bump
        run: |
          rc=0
          output=$(node scripts/auto-version.mjs 2>&1) || rc=$?
          if [ "$rc" -eq 1 ]; then
            echo "No release needed — skipping."
            echo "$output"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$rc" -ne 0 ]; then
            echo "::error::auto-version.mjs crashed (exit $rc):"
            echo "$output"
            exit 1
          fi
          version=$(echo "$output" | grep '^NEW_VERSION=' | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag
        if: steps.bump.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${VERSION}"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin master "${VERSION}"

  build-binaries:
    needs: [version]
    if: needs.version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: 10x-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: 10x-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: 10x-darwin-arm64
          - os: macos-14
            target: bun-darwin-x64
            artifact: 10x-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: 10x-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ needs.version.outputs.new_version }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --minify src/index.ts --target ${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish-npm:
    needs: [version]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ needs.version.outputs.new_version }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile && bun run build

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: [version, build-binaries]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          generate_release_notes: true
          files: release-assets/**/*

  notify-slack:
    needs: [check, e2e, version, publish-npm, github-release]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Build notification payload
        id: payload
        run: |
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | cut -c1-80)
          echo "commit_msg=${MSG}" >> "$GITHUB_OUTPUT"

      - name: Post pipeline result to Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ needs.check.result != 'success' && '❌' || needs.version.outputs.should_release == 'true' && needs.publish-npm.result == 'success' && '📦' || '✅' }} 10x-cli pipeline",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.check.result != 'success' && '❌' || needs.version.outputs.should_release == 'true' && needs.publish-npm.result == 'success' && '📦' || '✅' }} *10x-cli* — ${{ needs.version.outputs.should_release == 'true' && format('release *{0}*', needs.version.outputs.new_version) || 'pipeline' }} *${{ needs.check.result }}*\n\n*Tests:* ${{ needs.check.result }} · *E2E:* ${{ needs.e2e.result }} · *Version:* ${{ needs.version.result }}\n*npm:* ${{ needs.publish-npm.result }} · *Release:* ${{ needs.github-release.result }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`> — ${{ steps.payload.outputs.commit_msg }}\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                    }
                  ]
                }
              ]
            }
